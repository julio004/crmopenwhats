# OpenSpec / SDD project configuration
# Generated by SDD init on 2026-06-01. Keep user-maintained edits intact.
project:
  name: Bot-personal
  language: es
  description: >-
    Local WhatsApp AI agent specification repository. Current artifacts include
    promt.md plus n8n-style workflow/reference JSON files (concepto.json and
    seguimiento.json) for assessing prompt and follow-up behavior.
  current_state: >-
    No application source scaffold is present yet; repository currently contains
    requirements/reference artifacts only.

stack:
  detected_from: promt.md
  runtime: Node.js 20+
  framework: Next.js 16 App Router + TypeScript + React 19
  ui: Tailwind CSS 4
  whatsapp_client: "@whiskeysockets/baileys 6.7+"
  database: PostgreSQL via pg
  orchestration: Docker Compose
  llm_provider: DeepSeek via native fetch or HTTP client
  scheduler: node-cron or robust setInterval
  forbidden:
    - Prisma
    - Drizzle
    - Supabase
    - WebSockets
    - Vercel
    - Meta API oficial
    - Twilio

testing:
  runner_detected: node-test-with-tsx
  test_command: npm test
  notes: >-
    Initial implementation slice added a minimal TypeScript test strategy using
    Node's built-in test runner with tsx: `node --import tsx --test
    tests/**/*.test.ts`. Future UI/bot integration may add additional lint/build
    commands when the Next.js scaffold is implemented.

sdd:
  methodology: openspec
  artifact_store: openspec
  execution_mode: interactive
  pr_strategy: auto-forecast
  review_budget_changed_lines: 400
  strict_tdd: true
  phase_rules:
    init:
      purpose: Confirm project context, SDD config, registry, and test capability.
    proposal:
      required_before_apply: true
      include_problem_scope_acceptance_risks: true
    design:
      required_for_cross_cutting_or_ambiguous_behavior: true
    tasks:
      required_before_apply: true
      require_test_first_tasks: true
    apply:
      do_not_start_without_user_delivery_decision_if_forecast_conflicts: true
      keep_changes_reviewable: true
    verify:
      require_tests_or_explicit_no_test_rationale: true

conventions:
  primary_docs:
    - promt.md
    - concepto.json
    - seguimiento.json
  requested_change_focus: >-
    Assess whether the prompt complies with concepto.json and seguimiento.json,
    and specify behavior requiring the bot to read conversation context before
    every reply and close the session for that message, simulating a real user.
